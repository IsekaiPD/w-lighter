{% load static %}

<aside class="sidebar" id="sidebar">

  <!-- 닫힌 상태 로고 -->
  <div class="sidebar-logo-short">w<span>.</span></div>

  <!-- 열린 상태 로고 -->
  <div class="sidebar-logo-full">
    <div class="sidebar-logo-text">w.LiGHTER</div>
    <p class="sidebar-logo-tagline">Write, Light, Lighter</p>
  </div>

  <nav class="sidebar-nav">

    <!-- 햄버거 토글 -->
    <button class="sidebar-item sidebar-toggle-btn" id="sidebarToggle" aria-label="메뉴 열기/닫기">
      <span class="sidebar-icon-slot">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </span>
    </button>

    <!-- 내 서재 -->
    <a class="sidebar-item" href="/works/" data-nav="library">
      <span class="sidebar-icon-slot">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </span>
      <span class="sidebar-label">내 서재</span>
    </a>

    <!-- 작품 설정 -->
    <div class="sidebar-item sidebar-group" id="workSettingsGroup" data-nav="work-settings">
      <div class="sidebar-group-row">
        <span class="sidebar-icon-slot">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
          </svg>
        </span>
        <span class="sidebar-label">작품 설정</span>
      </div>
      <!-- 열린 상태 서브 아이템 -->
      <div class="sidebar-sub-list">
        <a class="sidebar-sub-item" href="{% url 'characters:list' work_pk=1 %}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          캐릭터 설정집
        </a>
        <a class="sidebar-sub-item" href="{% url 'covers:cover_image' %}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          표지 이미지
        </a>
        <a class="sidebar-sub-item" href="#">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          캐릭터 관계도
        </a>
      </div>
    </div>

    <!-- 현지화 가이드 -->
    <a class="sidebar-item" href="#" data-nav="localization">
      <span class="sidebar-icon-slot">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </span>
      <span class="sidebar-label">현지화 가이드</span>
    </a>

  </nav>
</aside>
